<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Rohit Mallavarapu | Executive Portfolio</title>
    <meta
      name="description"
      content="Global marketing leader and partnerships strategist. $7M+ revenue, 20x YoY growth, 100+ Fortune 1000 relationships. From startup spark to NASDAQ stage."
    />

    <!-- Open Graph (LinkedIn, WhatsApp, Slack, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rohit-executive-portfolio.vercel.app/" />
    <meta property="og:title" content="Rohit Mallavarapu | Executive Portfolio" />
    <meta
      property="og:description"
      content="Global marketing leader and partnerships strategist. $7M+ revenue, 20x YoY growth, 100+ Fortune 1000 relationships."
    />
    <meta
      property="og:image"
      content="https://rohit-executive-portfolio.vercel.app/og-image.png?v=6"
    />
    <meta property="og:image" content="https://rohit-executive-portfolio.vercel.app/wa.jpg" />
    <meta property="og:image:secure_url" content="https://rohit-executive-portfolio.vercel.app/wa.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Rohit Mallavarapu – Executive Portfolio" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rohit Mallavarapu | Executive Portfolio" />
    <meta
      name="twitter:description"
      content="Global marketing leader and partnerships strategist. $7M+ revenue, 20x YoY growth, 100+ Fortune 1000 relationships."
    />
    <meta
      name="twitter:image"
      content="https://rohit-executive-portfolio.vercel.app/og-image.png?v=6"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Optional: preload hero image (page performance only) -->
    <link rel="preload" as="image" href="/rohit.webp" fetchpriority="high" />

    <!-- Global styles loaded via src/index.tsx -->

    <!-- Minimal base styles (safe for crawlers) -->
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        background-color: #f0f4f8;
        color: #0a192f;
        margin: 0;
        overflow-x: hidden;
      }

      ::selection {
        background-color: #ff6b35;
        color: #ffffff;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
    </style>
  </head>

  <body>
    <div class="noise"></div>
    <div id="root"></div>

    <!-- App entry -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
