<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Rohit Mallavarapu | Marketing Leader</title>
    <meta
      name="description"
      content="From Startup Spark to NASDAQ Stage. Scaling revenue and partner ecosystems."
    />

    <!-- Open Graph (LinkedIn, WhatsApp, Slack, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rohit-executive-portfolio.vercel.app/" />
    <meta property="og:title" content="Rohit Mallavarapu | Marketing Leader" />
    <meta
      property="og:description"
      content="From Startup Spark to NASDAQ Stage. Scaling revenue and partner ecosystems."
    />
    <meta
      property="og:image"
      content="https://rohit-executive-portfolio.vercel.app/og-image.png?v=6"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rohit Mallavarapu | Marketing Leader" />
    <meta
      name="twitter:description"
      content="From Startup Spark to NASDAQ Stage. Scaling revenue and partner ecosystems."
    />
    <meta
      name="twitter:image"
      content="https://rohit-executive-portfolio.vercel.app/og-image.png?v=6"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Optional: preload hero image (page performance only) -->
    <link rel="preload" as="image" href="/rohit.webp" fetchpriority="high" />

    <!-- Global styles -->
    <link rel="stylesheet" href="/index.css" />

    <!-- Import maps -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.3",
          "react/": "https://esm.sh/react@^19.2.3/",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
          "@vercel/analytics/react": "https://esm.sh/@vercel/analytics@1.4.1/react"
        }
      }
    </script>

    <!-- Minimal base styles (safe for crawlers) -->
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        background-color: #f0f4f8;
        color: #0a192f;
        margin: 0;
        overflow-x: hidden;
      }

      ::selection {
        background-color: #ff6b35;
        color: #ffffff;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
    </style>
  </head>

  <body>
    <div class="noise"></div>
    <div id="root"></div>

    <!-- App entry -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
